<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chatbot</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #7c6aff;
    --accent2: #ff6a9b;
    --text: #e8e8f0;
    --muted: #5a5a7a;
    --user-bg: #1a1a2e;
    --bot-bg: #111118;
    --warn: #ffb347;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.2rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .header-right { display: flex; align-items: center; gap: 12px; }

  select {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    cursor: pointer;
    outline: none;
  }
  select:focus { border-color: var(--accent); }

  .btn-clear {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-clear:hover { color: var(--accent2); border-color: var(--accent2); }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    scroll-behavior: smooth;
  }

  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .message {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-width: 780px;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .message.user { align-self: flex-end; align-items: flex-end; }
  .message.bot  { align-self: flex-start; align-items: flex-start; }

  .msg-row {
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }

  .message.user .msg-row { flex-direction: row-reverse; }

  .avatar {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    flex-shrink: 0;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
  }

  .message.user .avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; }
  .message.bot  .avatar { background: var(--border); color: var(--accent); }

  .bubble {
    padding: 14px 18px;
    border-radius: 14px;
    font-size: 0.88rem;
    line-height: 1.7;
    max-width: 620px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .message.user .bubble {
    background: var(--user-bg);
    border: 1px solid var(--accent);
    border-top-right-radius: 4px;
  }

  .message.bot .bubble {
    background: var(--bot-bg);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }

  /* Action buttons below message */
  .msg-actions {
    display: flex;
    gap: 6px;
    opacity: 0;
    transition: opacity 0.2s;
    padding: 0 4px;
  }

  .message:hover .msg-actions { opacity: 1; }

  .action-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 0.7rem;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .action-btn:hover { color: var(--text); border-color: var(--accent); }
  .action-btn.copied { color: #4ade80; border-color: #4ade80; }

  /* Edit mode */
  .edit-area {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--accent);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.88rem;
    padding: 12px 14px;
    border-radius: 10px;
    resize: none;
    outline: none;
    line-height: 1.7;
    min-height: 60px;
  }

  .edit-buttons {
    display: flex;
    gap: 6px;
    margin-top: 6px;
  }

  .btn-save {
    background: var(--accent);
    color: white;
    border: none;
    padding: 5px 14px;
    border-radius: 6px;
    font-size: 0.75rem;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
  }

  .btn-cancel {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 5px 14px;
    border-radius: 6px;
    font-size: 0.75rem;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
  }

  .warn-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 8px;
    font-size: 0.72rem;
    color: var(--warn);
    border: 1px solid var(--warn);
    padding: 4px 10px;
    border-radius: 20px;
    opacity: 0.85;
  }

  .typing .bubble {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 16px 18px;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; background: var(--accent2); }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  .empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
    text-align: center;
  }

  .empty-icon { font-size: 3rem; margin-bottom: 8px; }

  .empty h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1.4rem;
    color: var(--text);
    font-weight: 700;
  }

  .empty p { font-size: 0.82rem; line-height: 1.6; max-width: 320px; }

  .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px; }

  .suggestion {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--text);
  }
  .suggestion:hover { border-color: var(--accent); color: var(--accent); }

  footer {
    padding: 16px 28px 24px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    max-width: 860px;
    margin: 0 auto;
  }

  textarea {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.88rem;
    padding: 12px 16px;
    border-radius: 12px;
    resize: none;
    outline: none;
    line-height: 1.5;
    min-height: 48px;
    max-height: 140px;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  #send-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    color: white;
    width: 48px;
    height: 48px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 1.1rem;
    transition: transform 0.15s, opacity 0.2s;
    flex-shrink: 0;
  }
  #send-btn:hover { transform: scale(1.05); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .footer-hint { text-align: center; font-size: 0.7rem; color: var(--muted); margin-top: 10px; }
</style>
</head>
<body>

<header>
  <div class="logo">⚡ AI Chatbot</div>
  <div class="header-right">
    <select id="template-select">
      <option value="">No template</option>
    </select>
    <button class="btn-clear" onclick="clearHistory()">Clear</button>
  </div>
</header>

<div id="chat">
  <div class="empty" id="empty-state">
    <div class="empty-icon">🤖</div>
    <h2>Kya poochna hai?</h2>
    <p>Koi bhi sawal poochho — ya ek template select karo upar se.</p>
    <div class="suggestions">
      <div class="suggestion" onclick="fillInput('Mera naam Regency hai, mujhe Python seekhna hai')">Python seekhna hai</div>
      <div class="suggestion" onclick="fillInput('Dal makhani ki recipe batao')">Dal makhani recipe</div>
      <div class="suggestion" onclick="fillInput('Mujhe Python developer ki job chahiye')">Job advice</div>
      <div class="suggestion" onclick="fillInput('Ek simple for loop ka example do')">For loop example</div>
    </div>
  </div>
</div>

<footer>
  <div class="input-row">
    <textarea id="input" placeholder="Kuch bhi poochho..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">➤</button>
  </div>
  <div class="footer-hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line</div>
</footer>

<script>
  const chatEl  = document.getElementById("chat");
  const inputEl = document.getElementById("input");
  const sendBtn = document.getElementById("send-btn");
  const emptyEl = document.getElementById("empty-state");
  const tmplSel = document.getElementById("template-select");

  fetch("/api/templates").then(r => r.json()).then(templates => {
    templates.forEach(t => {
      const opt = document.createElement("option");
      opt.value = t; opt.textContent = t;
      tmplSel.appendChild(opt);
    });
  });

  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + "px";
  });

  inputEl.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function fillInput(text) { inputEl.value = text; inputEl.focus(); }

  function addMessage(role, text) {
    emptyEl.style.display = "none";

    const wrap = document.createElement("div");
    wrap.className = `message ${role}`;

    const msgRow = document.createElement("div");
    msgRow.className = "msg-row";

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = role === "user" ? "U" : "AI";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;

    msgRow.appendChild(avatar);
    msgRow.appendChild(bubble);
    wrap.appendChild(msgRow);

    // Action buttons
    const actions = document.createElement("div");
    actions.className = "msg-actions";

    // Copy button
    const copyBtn = document.createElement("button");
    copyBtn.className = "action-btn";
    copyBtn.innerHTML = "⎘ Copy";
    copyBtn.onclick = () => {
      navigator.clipboard.writeText(bubble.textContent);
      copyBtn.textContent = "✓ Copied";
      copyBtn.classList.add("copied");
      setTimeout(() => { copyBtn.innerHTML = "⎘ Copy"; copyBtn.classList.remove("copied"); }, 2000);
    };
    actions.appendChild(copyBtn);

    // Edit button (only for user messages)
    if (role === "user") {
      const editBtn = document.createElement("button");
      editBtn.className = "action-btn";
      editBtn.innerHTML = "✎ Edit";
      editBtn.onclick = () => enterEditMode(wrap, bubble, actions, text);
      actions.appendChild(editBtn);
    }

    wrap.appendChild(actions);
    chatEl.appendChild(wrap);
    chatEl.scrollTop = chatEl.scrollHeight;
    return bubble;
  }

  function enterEditMode(wrap, bubble, actions, originalText) {
    bubble.style.display = "none";
    actions.style.display = "none";

    const editArea = document.createElement("textarea");
    editArea.className = "edit-area";
    editArea.value = bubble.textContent;
    editArea.rows = 3;

    const editBtns = document.createElement("div");
    editBtns.className = "edit-buttons";

    const saveBtn = document.createElement("button");
    saveBtn.className = "btn-save";
    saveBtn.textContent = "Send";
    saveBtn.onclick = () => {
      const newText = editArea.value.trim();
      if (!newText) return;
      bubble.textContent = newText;
      bubble.style.display = "";
      actions.style.display = "";
      editArea.remove();
      editBtns.remove();

      // Remove all messages after this one and resend
      const allMessages = [...chatEl.querySelectorAll(".message")];
      const idx = allMessages.indexOf(wrap);
      allMessages.slice(idx + 1).forEach(m => m.remove());

      sendEdited(newText);
    };

    const cancelBtn = document.createElement("button");
    cancelBtn.className = "btn-cancel";
    cancelBtn.textContent = "Cancel";
    cancelBtn.onclick = () => {
      bubble.style.display = "";
      actions.style.display = "";
      editArea.remove();
      editBtns.remove();
    };

    editBtns.appendChild(saveBtn);
    editBtns.appendChild(cancelBtn);
    wrap.appendChild(editArea);
    wrap.appendChild(editBtns);
    editArea.focus();
  }

  async function sendEdited(text) {
    sendBtn.disabled = true;
    addTyping();
    await streamResponse(text);
    sendBtn.disabled = false;
  }

  function addTyping() {
    emptyEl.style.display = "none";
    const wrap = document.createElement("div");
    wrap.className = "message bot typing";
    wrap.id = "typing";
    wrap.innerHTML = `<div class="msg-row"><div class="avatar">AI</div><div class="bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
    chatEl.appendChild(wrap);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
  }

  async function sendMessage() {
    const msg = inputEl.value.trim();
    if (!msg || sendBtn.disabled) return;
    inputEl.value = "";
    inputEl.style.height = "auto";
    sendBtn.disabled = true;
    addMessage("user", msg);
    addTyping();
    await streamResponse(msg);
    sendBtn.disabled = false;
    inputEl.focus();
  }

  async function streamResponse(msg) {
    const template = tmplSel.value || null;
    let botBubble = null;

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: msg, template })
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const data = JSON.parse(line.slice(6));

          if (data.token) {
            removeTyping();
            if (!botBubble) botBubble = addMessage("bot", "");
            botBubble.textContent += data.token;
            chatEl.scrollTop = chatEl.scrollHeight;
          }

          if (data.done && data.warn) {
            const badge = document.createElement("div");
            badge.className = "warn-badge";
            badge.textContent = "⚠ Factual info — verify karo";
            botBubble.parentElement.parentElement.appendChild(badge);
          }

          if (data.error) {
            removeTyping();
            addMessage("bot", "Error: " + data.error);
          }
        }
      }
    } catch (e) {
      removeTyping();
      addMessage("bot", "Connection error. Server chal raha hai?");
    }
  }

  async function clearHistory() {
    await fetch("/api/history", { method: "DELETE" });
    chatEl.innerHTML = "";
    chatEl.appendChild(emptyEl);
    emptyEl.style.display = "flex";
  }
</script>
</body>
</html>
